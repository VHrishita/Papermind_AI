<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PaperMind Signup</title>
<link rel="icon" type="image/png" href="logo.png" />
<link rel="stylesheet" href="auth.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="login.js"></script>
  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }
    .login-box{
      width:350px;
      background:#1e293b;
      padding:30px;
      border-radius:16px;
    }
    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:10px;
      box-sizing:border-box;
    }
    button{
      width:100%;
      padding:12px;
      border:none;
      background:#6366f1;
      color:white;
      border-radius:10px;
      cursor:pointer;
      margin-top:10px;
    }
    a{
      color:#818cf8;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Create your account 🚀</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="signup()">Sign Up</button>

    <p class="auth-switch">
      Already have an account?
      <a href="app.html">Login now</a>
    </p>
  </div>
</body>
</html>
